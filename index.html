const HOUR_H=80,SLOT_H=20;
const mtp=m=>(m/60)*HOUR_H;

  {section:2,sectionTitle:'Bridge — The Divine Command',sectionTime:'~1 min',id:'r4',type:'Al-Ahzab 33:56',count:'1×',arabic:'إِنَّ اللهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا',translit:'Innallāha wa malā\'ikatahu yuṣallūna \'alan nabiyy — yā ayyuhal ladhīna āmanū ṣallū \'alayhi wa sallimū taslīmā',translation:'Indeed Allah and His angels send blessings upon the Prophet — O believers, send blessings upon him.',note:'Allah and His entire heavenly realm are already doing this. Now you join them.'},

  {section:3,id:'r6',type:'Salawat Ibrahimiyyah',count:'3×',arabic:'اَللّٰهُمَّ صَلِّ عَلٰى مُحَمَّدٍ وَعَلٰى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلٰى إِبْرَاهِيْمَ وَعَلٰى آلِ إِبْرَاهِيْمَ إِنَّكَ حَمِيْدٌ مَجِيْدٌ',translit:'Allāhumma ṣalli \'alā Muḥammadin wa \'alā āli Muḥammadin kamā ṣallayta \'alā Ibrāhīma — innaka Ḥamīdun Majīd',translation:'O Allah, bless Muhammad and the family of Muhammad, as You blessed Ibrahim — You are Praiseworthy, Glorious.',note:'The durood the Prophet ﷺ himself taught us.'},
  {section:4,sectionTitle:'Istighfar',sectionTime:'~2 min',id:'r7',type:'Istighfar',count:'100×',arabic:'أَسْتَغْفِرُ اللهَ',translit:'Astaghfirullāh',translation:'I seek forgiveness from Allah.',note:'The Prophet ﷺ did this 70+ times daily — not only for sin, but as a constant return.'},
  {section:5,sectionTitle:'Zikr & Tahlil — The Heart',sectionTime:'~12 min',id:'r8',type:'Tahlil Prelude',count:'3×',arabic:'لَا إِلٰهَ إِلَّا اللهُ حَيٌّ مَوْجُوْدٌ، حَيٌّ مَقْصُوْدٌ، حَيٌّ مَعْبُوْدٌ، حَيٌّ بَاقٍ',translit:'Lā ilāha illallāh — Ḥayyun Mawjūd, Ḥayyun Maqṣūd, Ḥayyun Ma\'būd, Ḥayyun Bāq',translation:'None worthy of worship but Allah — Ever-Living · the Desired · the Worshipped · the Everlasting.',note:'Prepare the heart before entering His remembrance.'},
  {section:5,id:'r9',type:'Main Tahlil',count:'200×',arabic:'لَا إِلٰهَ إِلَّا اللهُ',translit:'Lā ilāha illallāh',translation:'None is worthy of worship but Allah.',note:'Breathe in on Lā ilāha — breathe out on illallāh. Slow. Rhythmic. 8–10 minutes.'},
  {section:5,id:'r10',type:'Tasbih',count:'33× each',arabic:'سُبْحَانَ اللهِ · الْحَمْدُ للهِ · اللهُ أَكْبَرُ',translit:'Subḥānallāh · Alḥamdulillāh · Allāhu Akbar',translation:'Glory be to Allah · All praise is for Allah · Allah is the Greatest',note:'33 each = 99 total.'},
  {section:5,id:'r11',type:'Asma ul Husna',count:'33×',arabic:'يَا لَطِيْفُ يَا اللهُ',translit:'Yā Laṭīfu Yā Allāh',translation:'O The Subtle and Gentle One — O Allah',note:'Al-Laṭīf: Allah who knows the finest details of your situation.'},
  {section:5,id:'r12',type:'Asma ul Husna',count:'33×',arabic:'يَا حَيُّ يَا قَيُّوْمُ',translit:'Yā Ḥayyu Yā Qayyūm',translation:'O The Ever-Living, O The Self-Sustaining',note:'The Prophet ﷺ specifically recommended these two together.'},
  {section:5,id:'r13',type:'Asma ul Husna',count:'33×',arabic:'يَا بَاسِطُ يَا وَدُوْدُ',translit:'Yā Bāsiṭu Yā Wadūd',translation:'O The Expander, O The Most Loving',note:'Al-Bāsiṭ expands provision and the heart. Al-Wadūd\'s love is unconditional.'},
  {section:5,id:'r14',type:'Zikr / Tawakkul',count:'33×',arabic:'حَسْبُنَا اللهُ وَنِعْمَ الْوَكِيْلُ',translit:'Ḥasbunallāhu wa ni\'mal Wakīl',translation:'Allah is sufficient for us, and He is the best Disposer of affairs.',note:'Quran 3:173 — what the companions said when told an army was marching against them.'},
  {section:5,id:'r15',type:'Zikr-Qasida',count:'3×',arabic:'لَا إِلٰهَ إِلَّا اللهُ يُحْيِي قَلْبِي ذِكْرُ اللهِ · حَسْبِي رَبِّي جَلَّ اللهُ · عَلَى النَّبِيِّ صَلَوَاتُ اللهِ',translit:'Lā ilāha illallāh — yuḥyī qalbī dhikrillāh · ḥasbī rabbī jallallāh · \'alan nabiyyi ṣalawātullāh',translation:'La ilaha illallah — Allah\'s remembrance gives life to my heart · My Lord\'s glory is enough · Blessings upon the Prophet',note:'Tahlil, tawakkul, and salawat in one breath.'},
  {section:6,sectionTitle:'Madeeh & Qasidas',sectionTime:'~7 min',id:'r16',type:'Your Personal Piece',count:'3×',arabic:'اَلصَّلَاةُ عَلَى النَّبِيِّ وَالسَّلَامُ عَلَى الرَّسُوْلِ\nالشَّافِعُ الْأَبْطَحِيِّ وَمُحَمَّدٌ عَرَبِيُّ\nيَا أَللهُ يَا رَحْمٰنُ يَا رَحِيْمَ الْمُؤْمِنِيْنَ\nأَحْمَدُ الْمُصْطَفٰى سَيِّدُ الْمُرْسَلِيْنَ وَعَلٰى آلِهِ وَصَحْبِهِ أَجْمَعِيْنَ',translit:'Aṣ-ṣalātu \'alan nabiyyi was-salāmu \'alar rasūl\nAsh-shāfi\'ul abṭaḥiyyi wa Muḥammadun \'arabiyy\nYā Allāhu yā Raḥmānu yā Raḥīmal mu\'minīn\nAḥmadul Muṣṭafā sayyidul mursalīn wa \'alā ālihi wa ṣaḥbihi ajma\'īn',translation:'Blessings on the Prophet, peace upon the Messenger\nThe intercessor of the noble valley, and Muhammad the Arab\nO Allah, O Most Merciful, O Merciful to the believers\nAhmad the Chosen, Master of the Messengers — and upon all his family and companions',note:'Your personal piece from Video 3.'},
  {section:6,id:'r17',type:'Hassan ibn Thabit ؓ',count:'3×',arabic:'وَأَحْسَنُ مِنْكَ لَمْ تَرَ قَطُّ عَيْنِي\nوَأَجْمَلُ مِنْكَ لَمْ تَلِدِ النِّسَاءُ\nخُلِقْتَ مُبَرَّأً مِنْ كُلِّ عَيْبٍ\nكَأَنَّكَ قَدْ خُلِقْتَ كَمَا تَشَاءُ',translit:'Wa aḥsanu minka lam tara qaṭṭu \'aynī\nWa ajmalu minka lam talidi n-nisā\'\nKhuliqta mubarraan min kulli \'ayb\nKa\'annaka qad khuliqta kamā tashā\'',translation:'More beautiful than you, no eye has ever seen\nMore perfect than you, no woman has ever borne\nYou were created free of all defect\nAs if you were created just as you wished to be',note:'By the Prophet\'s ﷺ own companion-poet.'},
  {section:6,id:'r18',type:'Qasida Burda',count:'3×',arabic:'مَوْلَايَ صَلِّ وَسَلِّمْ دَائِمًا أَبَدًا\nعَلٰى حَبِيْبِكَ خَيْرِ الْخَلْقِ كُلِّهِمِ',translit:'Mawlāya ṣalli wa sallim dā\'iman abadā\n\'alā ḥabībika khayril khalqi kullihimi',translation:'My Master, send blessings and peace — eternally, forever\nUpon Your Beloved, the best of all creation',note:'Imam al-Busiri was paralysed, composed this in love of the Prophet ﷺ, and was healed.'},
  {section:6,id:'r19',type:'Qad Kafani',count:'3×',arabic:'قَدْ كَفَانِي عِلْمُ رَبِّي مِنْ سُؤَالٍ وَسُؤَالِ\nفِيْهِ سِرِّي وَجِهَارِي وَمَآلِي وَحَالِي',translit:'Qad kafānī \'ilmu rabbī min su\'ālin wa su\'āl\nFīhi sirrī wa jihārī wa ma\'ālī wa ḥālī',translation:'My Lord\'s knowledge suffices me from asking and asking\nIn it is my secret and my open state, my destiny and my condition',note:'The poem that started this entire journey.'},

const toSecs=s=>{if(!s||s==='—')return 0;const[h,m]=s.split(':').map(Number);return(h||0)*3600+(m||0)*60;};
const fmtCd=s=>{const t=Math.max(0,Math.floor(s));return[Math.floor(t/3600),Math.floor((t%3600)/60),t%60].map(n=>String(n).padStart(2,'0')).join(':');};
const getHijri=()=>{
  const months=['Muharram','Ṣafar','Rabī\' al-Awwal','Rabī\' al-Thānī','Jumādā al-Ūlā','Jumādā al-Ākhirah','Rajab','Sha\'bān','Ramaḍān','Shawwāl','Dhul Qa\'dah','Dhul Ḥijjah'];
  const jd=Math.floor(Date.now()/86400000+2440587.5);
  let l=jd-1948440+10632,n=Math.floor((l-1)/10631);l-=10631*n-354;
  const j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);
  l-=Math.floor((30-j)/15)*Math.floor((17719*j)/50)+Math.floor(j/16)*Math.floor((15238*j)/43);
  const d=l-29*Math.floor(l/29),mo=Math.floor((11*l+1)/325),y=30*n+j-30;
  return`${d} ${months[mo-1]} ${y} AH`;
};

// ── Stars ──
function Stars(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current,ctx=c.getContext('2d');
    let W=c.width=innerWidth,H=c.height=innerHeight;
    const st=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,sp:Math.random()*.005+.002,ph:Math.random()*Math.PI*2}));
    let fr;
    const draw=t=>{ctx.clearRect(0,0,W,H);st.forEach(s=>{const a=.2+.5*Math.abs(Math.sin(t*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,248,220,${a})`;ctx.fill();});fr=requestAnimationFrame(draw);};
    fr=requestAnimationFrame(draw);
    const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight;};
    addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(fr);removeEventListener('resize',resize);};
  },[]);
  return <canvas id="stars" ref={ref}/>;
}

// ── Layout helpers ──
const dateKey=d=>new Date(d).toISOString().slice(0,10);
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const fmtDay=d=>new Date(d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
const isToday=d=>dateKey(d)===dateKey(new Date());

const layoutBlocks=blocks=>{
  if(!blocks.length)return[];
  const sorted=[...blocks].sort((a,b)=>a.start-b.start);
  const cols=[];
  const res=sorted.map(b=>{
    let c=cols.findIndex(e=>e<=b.start);
    if(c===-1){c=cols.length;cols.push(0);}
    cols[c]=b.start+b.dur;
    return{...b,_col:c};
  });
  return res.map(b=>{
    let mc=b._col;
    res.forEach(o=>{
      if(o.id!==b.id&&o.start<b.start+b.dur&&o.start+o.dur>b.start)mc=Math.max(mc,o._col);
    });
    return{...b,_tc:mc+1};
  });
};

  const navDay=n=>{const d=addDays(planDate,n);setPlanDate(d);};

  const onDS=(e,id)=>{
    e.stopPropagation();
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const rect=gridRef.current.getBoundingClientRect();
    const st=wrapRef.current.scrollTop;
    const block=blocks.find(b=>b.id===id);
    setDrag({id,offsetY:(cy-rect.top+st)-mtp(block.start)});
  };
  const onDM=e=>{
    if(!drag)return;e.preventDefault();
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const rect=gridRef.current.getBoundingClientRect();
    const st=wrapRef.current.scrollTop;
    const snapped=Math.max(0,Math.min(1425,ptm((cy-rect.top+st)-drag.offsetY)));
    setBlocks(prev=>prev.map(b=>b.id===drag.id?{...b,start:snapped}:b));
  };
  const onDE=()=>{if(drag){store.set(`rawdah_blocks_${dateKey(planDate)}`,blocks);}setDrag(null);};

  const doAdd=()=>{
    if(!nb.title.trim())return;
    const newBlocks=[...blocks,{id:`b${Date.now()}`,cat:nb.cat,title:nb.title,note:nb.note,start:parseM(nb.start),dur:Math.max(15,parseInt(nb.dur)||60)}];
    saveBlocks(newBlocks);setAdding(false);setNb({cat:'ibadah',title:'',note:'',start:'08:00',dur:'60'});
  };

  const saveTpl=()=>{store.set('rawdah_tpl',blocks);setToast('Template saved 🤍');setTimeout(()=>setToast(''),2500);};
  const resetTpl=()=>{const tpl=store.get('rawdah_tpl',null)||DEF_BLOCKS;saveBlocks(tpl);setToast('Day reset to template');setTimeout(()=>setToast(''),2000);};

  const handleBlockTap=b=>{
    if(!drag){
      if(b.link){go(b.link);}
      else setSel(b);
    }
  };

  const laidOut=layoutBlocks(blocks);

  const G='var(--gold)',B='var(--br)';
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'10px 14px 8px',borderBottom:`1px solid ${B}`,background:'rgba(2,9,18,.97)',flexShrink:0}}>
        {/* Date nav row */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14,color:'var(--ts)'}} onClick={()=>navDay(-1)}>‹</div>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:.5,color:isToday(planDate)?G:'var(--tp)'}}>
                {isToday(planDate)?'Today':fmtDay(planDate)}
              </div>
              <div style={{fontSize:9,color:'var(--td)',letterSpacing:.5}}>{new Date(planDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14,color:'var(--ts)'}} onClick={()=>navDay(1)}>›</div>
            {!isToday(planDate)&&<div style={{fontSize:9,padding:'3px 8px',borderRadius:8,background:'rgba(201,168,76,.12)',border:`1px solid ${B}`,color:G,cursor:'pointer'}} onClick={()=>setPlanDate(new Date())}>Today</div>}
          </div>
          <div style={{display:'flex',gap:5}}>
            <div style={{background:'rgba(91,155,213,.1)',border:'1px solid rgba(91,155,213,.3)',borderRadius:9,padding:'4px 9px',fontSize:8,color:'#5B9BD5',cursor:'pointer',letterSpacing:1.5,textTransform:'uppercase'}} onClick={()=>setJOpen(true)}>Jamaat</div>
            <div style={{background:'rgba(201,168,76,.12)',border:`1px solid ${B}`,borderRadius:9,padding:'4px 9px',fontSize:8,color:G,cursor:'pointer',letterSpacing:1.5,textTransform:'uppercase'}} onClick={saveTpl}>Save ♡</div>
            <div style={{background:'rgba(255,255,255,.04)',border:`1px solid ${B}`,borderRadius:9,padding:'4px 9px',fontSize:8,color:'var(--td)',cursor:'pointer',letterSpacing:1.5,textTransform:'uppercase'}} onClick={resetTpl}>Reset</div>
          </div>
        </div>
        {/* Salah strip */}
        <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:2}}>
          {salah.map(s=>(
            <div key={s.key} style={{flexShrink:0,border:`1px solid ${s.jamaat?'rgba(91,155,213,.3)':'rgba(201,168,76,.15)'}`,borderRadius:8,padding:'4px 8px',textAlign:'center',minWidth:44,background:s.jamaat?'rgba(91,155,213,.06)':'rgba(255,255,255,.03)'}}>
              <div style={{fontFamily:"'Amiri',serif",fontSize:s.jamaat?8:11,color:s.jamaat?'#5B9BD5':G,lineHeight:1,marginBottom:1,letterSpacing:s.jamaat?1:0,textTransform:s.jamaat?'uppercase':'none'}}>{s.jamaat?'J':(s.arabic||s.label.charAt(0))}</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:'var(--tp)'}}>{s.time}</div>
            </div>
          ))}
        </div>
      </div>

      <div ref={wrapRef} style={{flex:1,overflowY:'scroll',overflowX:'hidden',position:'relative',touchAction:drag?'none':'pan-y'}}
        onMouseMove={onDM} onTouchMove={onDM} onMouseUp={onDE} onTouchEnd={onDE} onMouseLeave={onDE}>
        <div style={{position:'relative',display:'flex',height:totalH}}>
          <div style={{width:48,flexShrink:0,position:'relative',height:totalH}}>
            {Array.from({length:25},(_,i)=><div key={i} style={{position:'absolute',right:7,top:i*HOUR_H,fontFamily:"'Cinzel',serif",fontSize:8,color:'var(--td)',letterSpacing:.5,transform:'translateY(-50%)',whiteSpace:'nowrap'}}>{i<24?`${String(i).padStart(2,'0')}:00`:''}</div>)}
          </div>
          <div ref={gridRef} style={{flex:1,position:'relative',borderLeft:'1px solid rgba(201,168,76,.1)',height:totalH}}>
            {Array.from({length:24*4},(_,i)=><div key={i} style={{position:'absolute',left:0,right:0,top:i*SLOT_H,borderTop:i%4===0?'1px solid rgba(201,168,76,.1)':i%2===0?'1px dashed rgba(255,255,255,.04)':'1px solid rgba(255,255,255,.025)',pointerEvents:'none'}}/>)}
            {salah.map(s=>{
              const top=mtp(parseM(s.time)),type=s.jamaat?'jm':'aw';
              return<div key={s.key} style={{position:'absolute',left:0,right:0,top,zIndex:5,pointerEvents:'none'}}>
                <div style={{height:1,background:s.jamaat?'linear-gradient(90deg,#5B9BD5,rgba(91,155,213,.15))':'linear-gradient(90deg,var(--gold),rgba(201,168,76,.15))'}}/>
                <div style={{display:'inline-flex',alignItems:'center',gap:4,marginTop:2,padding:'2px 8px 2px 4px',borderRadius:'0 6px 6px 0',background:s.jamaat?'rgba(91,155,213,.09)':'rgba(201,168,76,.09)'}}>
                  {s.arabic&&<span style={{fontFamily:"'Amiri',serif",fontSize:13,lineHeight:1,color:s.jamaat?'#5B9BD5':G}}>{s.arabic}</span>}
                  <span style={{fontSize:8,letterSpacing:1.5,textTransform:'uppercase',color:s.jamaat?'#5B9BD5':G}}>{s.label}</span>
                  <span style={{fontSize:8,color:'var(--td)',fontFamily:"'Cinzel',serif"}}>{s.time}</span>
                </div>
              </div>;
            })}
            <div style={{position:'absolute',left:0,right:0,top:nowY,zIndex:7,pointerEvents:'none'}}>
              <div style={{position:'absolute',left:-3,width:7,height:7,borderRadius:'50%',background:'#E84040',transform:'translateY(-3px)'}}/>
              <div style={{position:'absolute',left:4,right:0,height:1,background:'rgba(232,64,64,.5)'}}/>
            </div>
            {laidOut.map(b=>{
              const cat=CATS[b.cat]||CATS.custom;
              const top=mtp(b.start),height=Math.max(SLOT_H,mtp(b.dur));
              const isDrag=drag?.id===b.id,small=height<36;
              const hasLink=!!b.link;
              const colW=100/b._tc;
              const colL=b._col*colW;
              return<div key={b.id} style={{
                position:'absolute',
                left:`calc(${colL}% + 2px)`,
                width:`calc(${colW}% - 4px)`,
                top,height,
                background:cat.bg,
                border:`1px solid ${cat.border}`,
                borderRadius:10,display:'flex',overflow:'hidden',
                cursor:'pointer',
                zIndex:isDrag?20:4,
                boxShadow:isDrag?'0 10px 40px rgba(0,0,0,.7)':b._tc>1?'0 2px 8px rgba(0,0,0,.4)':undefined,
                opacity:isDrag?0.92:1
              }} onClick={()=>handleBlockTap(b)}>
                <div style={{width:16,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',cursor:'grab',fontSize:9,color:'rgba(255,255,255,.2)',touchAction:'none'}}
                  onMouseDown={e=>onDS(e,b.id)} onTouchStart={e=>onDS(e,b.id)} onClick={e=>e.stopPropagation()}>⠿</div>
                <div style={{flex:1,padding:'4px 4px 4px 0',minWidth:0,display:'flex',flexDirection:'column',justifyContent:'center',overflow:'hidden'}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:.2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',color:cat.color}}>{b.title}{hasLink?' →':''}</div>
                  {!small&&<div style={{fontSize:7,opacity:.55,letterSpacing:.3,marginTop:1,whiteSpace:'nowrap'}}>{fmtT(b.start)}–{fmtT(b.start+b.dur)}</div>}
                </div>
                {!small&&b._tc===1&&<div style={{padding:'4px 4px 0 0',fontSize:11,flexShrink:0}}>{cat.icon}</div>}
              </div>;
            })}
          </div>
        </div>
      </div>

      <div style={{position:'absolute',bottom:86,right:16,width:50,height:50,borderRadius:'50%',background:G,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',zIndex:15,boxShadow:'0 4px 20px rgba(201,168,76,.4)',fontSize:26,color:'#020912',fontWeight:700}} onClick={()=>setAdding(true)}>+</div>
      {toast&&<div style={{position:'fixed',bottom:110,left:'50%',transform:'translateX(-50%)',background:'rgba(109,179,138,.2)',border:'1px solid var(--gr)',borderRadius:12,padding:'10px 20px',fontSize:12,color:'var(--gr)',zIndex:60,pointerEvents:'none'}}>{toast}</div>}

      {sel&&<Modal onClose={()=>setSel(null)} title={sel.title} subtitle={`${fmtT(sel.start)} – ${fmtT(sel.start+sel.dur)} · ${sel.dur} min · ${CATS[sel.cat]?.label}`}>
        {sel.note&&<div style={{marginBottom:16}}><div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:G,opacity:.7,marginBottom:8}}>About this block</div><div style={{fontSize:13,color:'var(--ts)',lineHeight:1.8}}>{sel.note}</div></div>}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:G,opacity:.7,marginBottom:8}}>Reschedule</div>
          <div style={{display:'flex',gap:8}}>
            <input style={{flex:1,background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,borderRadius:10,padding:'11px 13px',color:'var(--tp)',fontSize:13,fontFamily:"'EB Garamond',serif",outline:'none'}} type="time" defaultValue={fmtT(sel.start)} onChange={e=>setBlocks(prev=>prev.map(b=>b.id===sel.id?{...b,start:parseM(e.target.value)}:b))}/>
            <input style={{flex:1,background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,borderRadius:10,padding:'11px 13px',color:'var(--tp)',fontSize:13,fontFamily:"'EB Garamond',serif",outline:'none'}} placeholder="Duration (min)" defaultValue={sel.dur} onChange={e=>setBlocks(prev=>prev.map(b=>b.id===sel.id?{...b,dur:Math.max(15,parseInt(e.target.value)||15)}:b))}/>
          </div>
        </div>
        <div style={{width:'100%',padding:13,background:'rgba(220,80,80,.12)',border:'1px solid rgba(220,80,80,.2)',borderRadius:13,fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:1,color:'rgba(220,80,80,.8)',cursor:'pointer',textAlign:'center',marginTop:8}} onClick={()=>{saveBlocks(blocks.filter(b=>b.id!==sel.id));setSel(null);}}>Remove Block</div>
      </Modal>}

      {adding&&<Modal onClose={()=>setAdding(false)} title="New Block" subtitle="Add anything to your day">
        <div style={{marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:G,opacity:.7,marginBottom:8}}>Category</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>
            {Object.entries(CATS).map(([k,v])=><div key={k} style={{border:`1px solid ${nb.cat===k?G:B}`,borderRadius:11,padding:'9px 6px',textAlign:'center',cursor:'pointer',background:nb.cat===k?'rgba(201,168,76,.12)':'rgba(255,255,255,.03)'}} onClick={()=>setNb(p=>({...p,cat:k}))}>
              <div style={{fontSize:18,marginBottom:3}}>{v.icon}</div>
              <div style={{fontSize:8,letterSpacing:1,textTransform:'uppercase',color:nb.cat===k?G:'var(--td)'}}>{v.label}</div>
            </div>)}
          </div>
        </div>
        {[['Title','text','e.g. Client meeting, Gym...','title'],['Note (optional)','text','Details, reminders...','note']].map(([lbl,type,ph,key])=>(
          <div key={key} style={{marginBottom:12}}>
            <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:G,opacity:.7,marginBottom:6}}>{lbl}</div>
            <input style={{width:'100%',background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,borderRadius:10,padding:'11px 13px',color:'var(--tp)',fontSize:13,fontFamily:"'EB Garamond',serif",outline:'none'}} type={type} placeholder={ph} value={nb[key]} onChange={e=>setNb(p=>({...p,[key]:e.target.value}))}/>
          </div>
        ))}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:G,opacity:.7,marginBottom:6}}>Start Time & Duration (min)</div>
          <div style={{display:'flex',gap:8}}>
            <input style={{flex:1,background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,borderRadius:10,padding:'11px 13px',color:'var(--tp)',fontSize:13,outline:'none'}} type="time" value={nb.start} onChange={e=>setNb(p=>({...p,start:e.target.value}))}/>
            <input style={{flex:1,background:'rgba(255,255,255,.05)',border:`1px solid ${B}`,borderRadius:10,padding:'11px 13px',color:'var(--tp)',fontSize:13,fontFamily:"'EB Garamond',serif",outline:'none'}} placeholder="Minutes" value={nb.dur} onChange={e=>setNb(p=>({...p,dur:e.target.value}))}/>
          </div>
        </div>
        <div style={{width:'100%',padding:13,background:G,border:'none',borderRadius:13,fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:1,color:'#020912',cursor:'pointer',textAlign:'center',fontWeight:600}} onClick={doAdd}>Add to Day</div>
      </Modal>}

      {jOpen&&<Modal onClose={()=>setJOpen(false)} title="Masjid Himayatul Islam" subtitle="Lenasia Ext. 1 · Lark Street · Update when the board changes">
        {salah.filter(s=>s.jamaat).map(s=>(
          <div key={s.key} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <div style={{fontSize:12,color:'var(--ts)',width:90,flexShrink:0}}>{s.label.replace(' Jamaat','')}</div>
            <input style={{flex:1,background:'rgba(255,255,255,.05)',border:'1px solid rgba(91,155,213,.3)',borderRadius:8,padding:'8px 12px',color:'var(--tp)',fontSize:13,fontFamily:"'Cinzel',serif",outline:'none'}} type="time" value={s.time} onChange={e=>setSalah(prev=>{const u=prev.map(p=>p.key===s.key?{...p,time:e.target.value}:p);store.set('rawdah_jamaat',u);return u;})}/>
          </div>
        ))}
        <div style={{width:'100%',padding:13,background:G,border:'none',borderRadius:13,fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:1,color:'#020912',cursor:'pointer',textAlign:'center',fontWeight:600,marginTop:16}} onClick={()=>setJOpen(false)}>Save Jamaat Times</div>
        <div style={{fontSize:10,color:'var(--td)',textAlign:'center',marginTop:12,fontStyle:'italic',lineHeight:1.5}}>Awal times auto-fetched from Muwaqqit API · Lenasia coordinates</div>
      </Modal>}
    </div>
  );
}

// ── ROUTINE ──
function Routine(){
  const dk=`rawdah_routine_${todayKey()}`;
  const [ck,setCk]=useState(()=>store.get(dk,{}));
  const [on,setOn]=useState({});
  const toggle=id=>{const n={...ck,[id]:!ck[id]};setCk(n);store.set(dk,n);};
  const note=id=>setOn(p=>({...p,[id]:!p[id]}));
  const done=Object.values(ck).filter(Boolean).length;
  const pct=(done/ROUTINE.length)*100;
  let ls=null;
  return(
    <div className="cnt scr">
      <div style={{padding:'16px 18px 14px'}}>
        <div style={{fontSize:9,letterSpacing:3,textTransform:'uppercase',color:'var(--gold)',opacity:.7,marginBottom:3}}>Fajr Awwal Routine</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:18,marginBottom:10}}>The Zikrs</div>
        <div style={{height:4,background:'rgba(255,255,255,.06)',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',background:'linear-gradient(90deg,var(--gold),var(--gb))',borderRadius:4,width:`${pct}%`,transition:'width .4s'}}/></div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:'var(--td)'}}><span>{done} of {ROUTINE.length} completed</span><span>{done===ROUTINE.length?'🤍 May Allah accept':`${ROUTINE.length-done} remaining`}</span></div>
      </div>
      {ROUTINE.map(item=>{
        const ns=item.section!==ls;if(ns)ls=item.section;
        return<div key={item.id}>
          {ns&&<div style={{margin:'18px 16px 10px',display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1,height:1,background:'var(--br)'}}/>
            <div style={{fontSize:9,letterSpacing:2,textTransform:'uppercase',color:'var(--gold)',opacity:.7,whiteSpace:'nowrap'}}>{item.sectionTitle}</div>
            {item.sectionTime&&<div style={{fontSize:9,color:'var(--td)',fontStyle:'italic',whiteSpace:'nowrap'}}>{item.sectionTime}</div>}
            <div style={{flex:1,height:1,background:'var(--br)'}}/>
          </div>}
          <div style={{margin:'0 16px 8px',background:'var(--card)',border:`1px solid ${ck[item.id]?'rgba(109,179,138,.25)':'var(--br)'}`,borderRadius:14,padding:'16px 14px',opacity:ck[item.id]?.55:1,transition:'all .2s'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:8,letterSpacing:2,textTransform:'uppercase',color:'var(--gold)',opacity:.7,marginBottom:4}}>{item.type}</div>
                <div style={{fontFamily:"'Amiri',serif",fontSize:20,lineHeight:2,direction:'rtl',textAlign:'right',color:'var(--tp)',marginBottom:8,whiteSpace:'pre-line'}}>{item.arabic}</div>
                <div style={{fontStyle:'italic',fontSize:10.5,color:'var(--gold)',opacity:.85,lineHeight:1.6,marginBottom:4,whiteSpace:'pre-line'}}>{item.translit}</div>
                <div style={{fontSize:10.5,color:'var(--ts)',lineHeight:1.6,whiteSpace:'pre-line'}}>{item.translation}</div>
                {item.note&&<div>
                  <div style={{marginTop:8,fontSize:9,color:'var(--td)',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>note(item.id)}>
                    <span style={{fontSize:8}}>{on[item.id]?'▼':'▶'}</span>{on[item.id]?'hide note':'show note'}
                  </div>
                  {on[item.id]&&<div style={{fontSize:9.5,fontStyle:'italic',color:'var(--td)',background:'rgba(201,168,76,.04)',borderLeft:'2px solid rgba(201,168,76,.25)',padding:'6px 10px',marginTop:8,borderRadius:'0 6px 6px 0',lineHeight:1.6}}>{item.note}</div>}
                </div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,flexShrink:0}}>
                <div style={{background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.35)',color:'var(--gold)',fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap'}}>{item.count}</div>
                <div style={{width:30,height:30,borderRadius:'50%',border:`2px solid ${ck[item.id]?'var(--gr)':'rgba(255,255,255,.15)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,cursor:'pointer',background:ck[item.id]?'var(--gr)':'transparent',color:ck[item.id]?'#0A1628':'transparent',transition:'all .2s'}} onClick={()=>toggle(item.id)}>{ck[item.id]?'✓':''}</div>
              </div>
            </div>
          </div>
        </div>;
      })}
      <div style={{textAlign:'center',padding:'24px 20px',borderTop:'1px solid rgba(255,255,255,.05)'}}>
        <div style={{fontFamily:"'Amiri',serif",fontSize:22,color:'var(--gold)',direction:'rtl',marginBottom:8}}>رَبَّنَا تَقَبَّلْ مِنَّا</div>
        <div style={{fontSize:11,fontStyle:'italic',color:'var(--td)'}}>Rabbanā taqabbal minnā — Our Lord, accept from us</div>
      </div>
    </div>
  );
}

// ── ZIKR ──
function Zikr(){
  const [idx,setIdx]=useState(0);const [cnt,setCnt]=useState(0);
  const cur=ZIKR_LIST[idx];const done=cnt>=cur.n;const pct=Math.min(cnt/cur.n,1);
  const R=56,C=2*Math.PI*R;
  return(
    <div className="cnt scr">
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,padding:20,textAlign:'center'}}>
        <div style={{fontSize:9,letterSpacing:3,textTransform:'uppercase',color:'var(--gold)',opacity:.7,marginBottom:16}}>{idx+1} of {ZIKR_LIST.length} · tap to count</div>
        <div style={{fontFamily:"'Amiri',serif",fontSize:34,color:'var(--tp)',direction:'rtl',lineHeight:1.8,marginBottom:8}}>{cur.a}</div>
        <div style={{fontStyle:'italic',fontSize:13,color:'var(--gold)',opacity:.85,marginBottom:4}}>{cur.t}</div>
        <div style={{fontSize:12,color:'var(--ts)',marginBottom:36,fontStyle:'italic'}}>{cur.tr}</div>
        <div style={{position:'relative',width:130,height:130,margin:'0 auto 24px'}}>
          <svg width="130" height="130" style={{position:'absolute',inset:0,transform:'rotate(-90deg)'}}>
            <circle cx="65" cy="65" r={R} fill="none" stroke="rgba(201,168,76,.1)" strokeWidth="4"/>
            <circle cx="65" cy="65" r={R} fill="none" stroke={done?'var(--gr)':'var(--gold)'} strokeWidth="4" strokeDasharray={C} strokeDashoffset={C*(1-pct)} strokeLinecap="round" style={{transition:'stroke-dashoffset .15s ease,stroke .3s'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:42,color:'var(--gb)',lineHeight:1}}>{cnt}</div>

          </div>
        </div>
        <div style={{width:100,height:100,borderRadius:'50%',background:done?'rgba(109,179,138,.1)':'rgba(201,168,76,.08)',border:`2px solid ${done?'rgba(109,179,138,.5)':'rgba(201,168,76,.3)'}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',margin:'0 auto 28px',position:'relative'}} onClick={()=>setCnt(c=>Math.min(c+1,cur.n))}>
          <span style={{fontFamily:"'Amiri',serif",fontSize:32,color:done?'var(--gr)':'var(--gold)'}}>{done?'✓':'﴾'}</span>
        </div>
        {done&&<div style={{fontSize:12,color:'var(--gr)',fontStyle:'italic',marginBottom:16}}>{cnt} complete 🤍</div>}
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <div style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--br)',borderRadius:12,padding:'8px 20px',cursor:'pointer',fontSize:11,color:'var(--ts)',opacity:idx===0?0.3:1}} onClick={()=>{if(idx>0){setIdx(i=>i-1);setCnt(0);}}}>← Prev</div>
          <div style={{fontSize:10,color:'var(--td)',cursor:'pointer',textDecoration:'underline',opacity:.6}} onClick={()=>setCnt(0)}>Reset</div>
          <div style={{background:'rgba(255,255,255,.05)',border:'1px solid var(--br)',borderRadius:12,padding:'8px 20px',cursor:'pointer',fontSize:11,color:'var(--ts)',opacity:idx===ZIKR_LIST.length-1?0.3:1}} onClick={()=>{if(idx<ZIKR_LIST.length-1){setIdx(i=>i+1);setCnt(0);}}}>Next →</div>
        </div>
      </div>
    </div>
  );
}

// ── TRACKER ──
function Tracker({onJumpToPlan}){
  const dk=`rawdah_tracker_${todayKey()}`;
  const [tog,setTog]=useState(()=>store.get(dk,{}));
  const toggle=id=>{const n={...tog,[id]:!tog[id]};setTog(n);store.set(dk,n);};

  // Streak calculation
  const [streak,setStreak]=useState(()=>{
    const s=store.get('rawdah_streak',{count:0,last:''});
    const today=todayKey();
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yKey=yesterday.toISOString().slice(0,10);
    if(s.last===today)return s.count;
    if(s.last===yKey)return s.count;
    return 0;
  });

  const today=new Date(),td=today.getDate(),dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate(),fd=new Date(today.getFullYear(),today.getMonth(),1).getDay();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push({t:'emp'});
  for(let d=1;d<=dim;d++){
    if(d<td-5)cells.push({d,t:'pst'});
    else if(d===td)cells.push({d,t:'tod'});
    else if(d<td)cells.push({d,t:'mis'});
    else cells.push({d,t:'fut'});
  }
  const done=Object.values(tog).filter(Boolean).length;
  const G='var(--gold)',B='var(--br)',C='var(--card)';
  return(
    <div className="cnt scr">
      <div style={{padding:'16px 18px 4px'}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:18,letterSpacing:1}}>Daily Tracker</div>
        <div style={{fontSize:11,fontStyle:'italic',color:'var(--ts)',marginTop:2}}>Consistency is the key to everything</div>
      </div>
      <div style={{margin:16,background:C,border:`1px solid ${B}`,borderRadius:18,padding:20}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:52,color:'var(--gb)',lineHeight:1}}>{streak}</div>
          <div style={{fontSize:10,color:'var(--td)',letterSpacing:2,textTransform:'uppercase',marginTop:2}}>Day Streak 🔥</div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
          {[{n:done,l:'Today'},{n:TRACK_ITEMS.length,l:'Total'},{n:`${Math.round(done/TRACK_ITEMS.length*100)}%`,l:'Done'}].map(x=>(
            <div key={x.l} style={{flex:1,textAlign:'center',background:'rgba(255,255,255,.03)',border:`1px solid ${B}`,borderRadius:12,padding:'10px 6px'}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:22}}>{x.n}</div>
              <div style={{fontSize:9,color:'var(--td)',letterSpacing:1}}>{x.l}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="slbl">Today — Mark Complete</div>
      {TRACK_ITEMS.map(item=>(
        <div key={item.id} style={{margin:'0 16px 8px',background:C,border:`1px solid ${B}`,borderRadius:14,padding:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div><div style={{fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:.3,marginBottom:2}}>{item.label}</div><div style={{fontSize:10,fontStyle:'italic',color:'var(--td)'}}>{item.sub}</div></div>
          <div style={{width:44,height:26,borderRadius:13,cursor:'pointer',transition:'all .3s',position:'relative',background:tog[item.id]?'rgba(109,179,138,.3)':'rgba(255,255,255,.06)',border:`1px solid ${tog[item.id]?'var(--gr)':B}`}} onClick={()=>toggle(item.id)}>
            <div style={{position:'absolute',top:3,width:18,height:18,borderRadius:'50%',transition:'all .3s',background:tog[item.id]?'var(--gr)':'var(--td)',left:tog[item.id]?22:4}}/>
          </div>
        </div>
      ))}
      <div className="slbl">{today.toLocaleString('default',{month:'long'})} {today.getFullYear()}</div>
      <div style={{margin:'0 16px 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:5,marginBottom:6}}>
          {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{textAlign:'center',fontSize:9,color:'var(--td)',letterSpacing:1,padding:'2px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:5}}>
          {cells.map((c,i)=>{
            const styles={emp:{background:'transparent',border:'none'},pst:{background:'rgba(109,179,138,.15)',border:'1px solid rgba(109,179,138,.2)',color:'var(--gr)'},tod:{background:'rgba(201,168,76,.15)',border:`1px solid ${G}`,color:G},fut:{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',color:'var(--td)'},mis:{background:'rgba(180,80,80,.1)',border:'1px solid rgba(180,80,80,.15)',color:'rgba(180,80,80,.6)'}};
            const canTap=c.t!=='emp'&&c.d;
            const handleTap=()=>{
              if(!canTap)return;
              const d=new Date(today.getFullYear(),today.getMonth(),c.d);
              onJumpToPlan(d);
            };
            return<div key={i} style={{aspectRatio:1,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontFamily:"'Cinzel',serif",cursor:canTap?'pointer':'default',...styles[c.t]}} onClick={handleTap}>{c.d||''}</div>;
          })}
        </div>
        <div style={{display:'flex',gap:12,marginTop:12,flexWrap:'wrap'}}>
          {[['pst','rgba(109,179,138,.15)','var(--gr)','Complete'],['tod','rgba(201,168,76,.15)',G,'Today'],['mis','rgba(180,80,80,.1)','rgba(180,80,80,.6)','Missed'],['fut','rgba(255,255,255,.03)','var(--td)','Upcoming']].map(([k,bg,col,lbl])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:10,height:10,borderRadius:3,background:bg,border:`1px solid ${col}`}}/><span style={{fontSize:9,color:'var(--td)'}}>{lbl}</span></div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const [nav,setNav]=useState('home');
  const [times,setTimes]=useState([]);
  const [cd,setCd]=useState('——:——:——');
  const [next,setNext]=useState(null);
  const [salah,setSalah]=useState(()=>store.get('rawdah_jamaat',null)||DEF_SALAH);
  const [hijriDate,setHijriDate]=useState(getHijri());
  const [jumpDate,setJumpDate]=useState(null);
  const [deferredPrompt,setDeferredPrompt]=useState(null);
  const [showInstall,setShowInstall]=useState(false);

  useEffect(()=>{
    const t=setTimeout(()=>setSplash(false),2800);
    return()=>clearTimeout(t);
  },[]);

  // PWA install prompt
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setDeferredPrompt(e);setShowInstall(true);};
    window.addEventListener('beforeinstallprompt',handler);
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  const doInstall=async()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    setDeferredPrompt(null);setShowInstall(false);
  };

  // Fetch awal times
  useEffect(()=>{
    fetch('https://api.aladhan.com/v1/timings?latitude=-26.3189&longitude=27.8355&method=2')
      .then(r=>r.json()).then(d=>{
        const H=d.data.date.hijri;
        if(H)setHijriDate(`${H.day} ${H.month.en} ${H.year} AH`);
        const T=d.data.timings;
        const map={fajr_awal:'Fajr',shuruq:'Sunrise',zuhr_awal:'Dhuhr',asr_awal:'Asr',maghrib:'Maghrib',isha_awal:'Isha'};
        setSalah(prev=>prev.map(s=>map[s.key]&&T[map[s.key]]?{...s,time:T[map[s.key]].slice(0,5)}:s));
        setTimes([
          {key:'Fajr',label:'Fajr',arabic:'الفجر',time:T.Fajr?.slice(0,5)||'04:48'},
          {key:'Sunrise',label:'Shuruq',arabic:'الشروق',time:T.Sunrise?.slice(0,5)||'06:25'},
          {key:'Dhuhr',label:'Zuhr',arabic:'الظهر',time:T.Dhuhr?.slice(0,5)||'12:58'},
          {key:'Asr',label:'Asr',arabic:'العصر',time:T.Asr?.slice(0,5)||'16:22'},
          {key:'Maghrib',label:'Maghrib',arabic:'المغرب',time:T.Maghrib?.slice(0,5)||'19:18'},
          {key:'Isha',label:'Isha',arabic:'العشاء',time:T.Isha?.slice(0,5)||'20:38'},
        ]);
      }).catch(()=>{
        setTimes([
          {key:'Fajr',label:'Fajr',arabic:'الفجر',time:'04:48'},
          {key:'Sunrise',label:'Shuruq',arabic:'الشروق',time:'06:25'},
          {key:'Dhuhr',label:'Zuhr',arabic:'الظهر',time:'12:58'},
          {key:'Asr',label:'Asr',arabic:'العصر',time:'16:22'},
          {key:'Maghrib',label:'Maghrib',arabic:'المغرب',time:'19:18'},
          {key:'Isha',label:'Isha',arabic:'العشاء',time:'20:38'},
        ]);
      });
  },[]);

  // Live countdown
  useEffect(()=>{
    if(!times.length)return;
    const tick=()=>{
      const now=new Date(),nm=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
      const sorted=[...times].sort((a,b)=>toSecs(a.time)-toSecs(b.time));
      const nxt=sorted.find(s=>toSecs(s.time)>nm)||sorted[0];
      setNext(nxt);
      setTimes(prev=>prev.map(s=>({...s,isNext:s.key===nxt?.key})));
      const diff=toSecs(nxt.time)>nm?toSecs(nxt.time)-nm:toSecs(nxt.time)+86400-nm;
      setCd(fmtCd(diff));
    };
    tick();const iv=setInterval(tick,1000);return()=>clearInterval(iv);
  },[times.length]);

  const NAV=[{id:'home',icon:'🕌',lbl:'Home'},{id:'plan',icon:'🗓',lbl:'Plan'},{id:'routine',icon:'📿',lbl:'Routine'},{id:'zikr',icon:'☪️',lbl:'Zikr'},{id:'kitab',icon:'📜',lbl:'Kitab'},{id:'tracker',icon:'🌙',lbl:'Tracker'}];

  return(
    <>
      <style>{GCSS}</style>
      <Stars/>
      <div className="geo"/>
      <div className={`splash${splash?'':' gone'}`}>
        <div className="sr"/><div className="sr"/><div className="sr"/>
        <div className="sa">روضة</div>
        <div className="sn">Rawdah</div>
        <div className="st">a garden from the gardens of Jannah</div>
      </div>
      <div className="app">
        <div className="hdr">
          <div className="hl"><div className="ha">روضة</div><div className="hn">Rawdah</div></div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {showInstall&&<div style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',background:'rgba(201,168,76,.15)',border:'1px solid rgba(201,168,76,.4)',borderRadius:8,padding:'5px 10px',color:'var(--gold)',cursor:'pointer'}} onClick={doInstall}>Install App</div>}
            <div className="hd"><div className="hhi">{hijriDate}</div><div className="hgr">{new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div></div>
          </div>
        </div>
        {nav==='home'    &&<Home times={times} cd={cd} next={next} go={setNav}/>}
        {nav==='plan'    &&<Planner salah={salah} setSalah={setSalah} go={setNav} jumpDate={jumpDate} setJumpDate={setJumpDate}/>}
        {nav==='routine' &&<Routine/>}
        {nav==='zikr'    &&<Zikr/>}
        {nav==='kitab'   &&<Kitab/>}
        {nav==='tracker' &&<Tracker onJumpToPlan={(d)=>{setJumpDate(d);setNav('plan');}}/>}
        <div className="bnav">
          {NAV.map(n=><div key={n.id} className={`ni${nav===n.id?' on':''}`} onClick={()=>setNav(n.id)}><span className="nic">{n.icon}</span><span className="nil">{n.lbl}</span></div>)}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(r=>{
      console.log('Rawdah SW registered');
    }).catch(e=>console.log('SW failed:',e));
  });
}
</script>
</body>
</html>
